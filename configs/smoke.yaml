run:
  output_dir: runs
  name: smoke
  seed: 7
env:
  id: CarRacing-v3
  n_envs: 1
  frame_stack: 4
  image_size: 84
  lap_complete_percent: 0.95
  domain_randomize: false
  max_episode_steps: 100
  terminate_off_track: true
  max_vehicle_off_track_fraction: 0.5
  off_track_penalty: -100.0
train:
  algorithm: ppo
  total_timesteps: 64
  device: cpu
  learning_rate: 0.00025
  n_steps: 32
  batch_size: 32
  n_epochs: 1
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  checkpoint_freq: 64
eval:
  frequency: 64
  seeds: [101]
  target_mean_reward: 800.0
  target_streak: 3
  deterministic: true
